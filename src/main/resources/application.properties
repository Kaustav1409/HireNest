spring.application.name=hirenest-backend

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/hirenest_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=${PORT:${SERVER_PORT:8080}}

app.jwt.secret=${APP_JWT_SECRET:hirenest-super-secret-key-hirenest-super-secret-key}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}
google.client.id=${GOOGLE_CLIENT_ID:}
app.google.client-id=${APP_GOOGLE_CLIENT_ID:}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


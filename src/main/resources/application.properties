spring.application.name=hirenest-backend

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:hirenest_db;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}

spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:true}
spring.h2.console.path=${SPRING_H2_CONSOLE_PATH:/h2-console}

server.port=${PORT:${SERVER_PORT:8080}}

app.jwt.secret=${APP_JWT_SECRET:hirenest-super-secret-key-hirenest-super-secret-key}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}
google.client.id=${GOOGLE_CLIENT_ID:}
app.google.client-id=${APP_GOOGLE_CLIENT_ID:}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


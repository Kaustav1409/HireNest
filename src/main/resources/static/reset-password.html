<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header>
    <div class="brand">
      <img src="/images/ta-logo.png" alt="HireNest logo" class="brand-logo">
      <h1>HireNest</h1>
    </div>
    <nav>
      <a href="/index.html">Home</a>
      <a href="/login.html">Login</a>
    </nav>
  </header>
  <main>
    <section class="auth-shell animate-on-scroll scale-in">
      <h2>Reset Password</h2>
      <form id="resetPasswordForm" class="auth-form" autocomplete="off">
        <div class="field">
          <input id="resetToken" placeholder=" " required>
          <label for="resetToken">Reset Token</label>
        </div>
        <div class="field">
          <input id="newPassword" type="password" placeholder=" " required autocomplete="new-password">
          <label for="newPassword">New Password</label>
          <button type="button" id="toggleNewPassword" class="password-toggle">Show</button>
        </div>
        <div class="field">
          <input id="confirmPassword" type="password" placeholder=" " required autocomplete="new-password">
          <label for="confirmPassword">Confirm Password</label>
          <button type="button" id="toggleConfirmPassword" class="password-toggle">Show</button>
        </div>
        <p id="resetMsg" class="auth-msg hidden"></p>
        <button type="submit">Reset Password</button>
      </form>
      <p><a href="/login.html">Back to Login</a></p>
    </section>
  </main>
  <script src="/script.js"></script>
  <script src="/js/api.js"></script>
  <script src="/reset-password.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header>
    <div class="brand">
      <img src="/images/ta-logo.png" alt="HireNest logo" class="brand-logo">
      <h1>HireNest</h1>
    </div>
    <nav>
      <a href="/index.html">Home</a>
      <a href="/login.html">Login</a>
    </nav>
  </header>
  <main>
    <section class="auth-shell animate-on-scroll scale-in">
      <h2>Forgot Password</h2>
      <p class="muted">Enter your account email to generate a reset token.</p>
      <form id="forgotPasswordForm" class="auth-form" autocomplete="off">
        <div class="field">
          <input id="forgotEmail" type="email" placeholder=" " required autocomplete="off" autocapitalize="none">
          <label for="forgotEmail">Email</label>
        </div>
        <p id="forgotMsg" class="auth-msg hidden"></p>
        <button type="submit">Generate Reset Token</button>
      </form>
      <div id="forgotTokenBox" class="card hidden">
        <b>Demo Reset Token</b>
        <p class="muted">Use this token on reset page.</p>
        <code id="resetTokenValue"></code>
        <p><a id="goResetLink" href="/reset-password.html">Go to Reset Password</a></p>
      </div>
    </section>
  </main>
  <script src="/script.js"></script>
  <script src="/js/api.js"></script>
  <script src="/forgot-password.js"></script>
</body>
</html>

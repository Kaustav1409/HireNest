<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="auth-page" data-google-client-id="212570088909-jgdkgiavkb23nvhlngiep5pq6p03liup.apps.googleusercontent.com">
  <header class="auth-topbar">
    <div class="brand">
      <img src="/images/ta-logo.png" alt="HireNest logo" class="brand-logo">
      <h1>HireNest</h1>
    </div>
    <nav>
      <a href="/index.html">Home</a>
      <a href="/login.html">Login</a>
    </nav>
  </header>
  <main class="auth-main">
    <section class="auth-shell animate-on-scroll scale-in">
    <div class="auth-kicker">Get started</div>
    <h2 class="animate-on-scroll fade-in">Create Your Account</h2>
    <p class="muted">Sign up in seconds, then complete guided onboarding.</p>
    <form id="registerForm" class="auth-form" autocomplete="off">
      <div class="field">
        <input id="fullName" placeholder=" " required>
        <label for="fullName">Full Name</label>
      </div>
      <div class="field">
        <input id="email" type="email" placeholder=" " required autocomplete="off" autocapitalize="none" spellcheck="false">
        <label for="email">Email</label>
      </div>
      <div class="field">
        <input id="password" type="password" placeholder=" " required autocomplete="new-password">
        <label for="password">Password</label>
        <button type="button" id="toggleRegisterPassword" class="password-toggle">Show</button>
      </div>
      <div class="field">
        <select id="role">
        <option value="JOB_SEEKER">Job Seeker</option>
        <option value="RECRUITER">Recruiter</option>
        </select>
        <label for="role">Role</label>
      </div>
      <p id="registerMsg" class="auth-msg hidden"></p>
      <button type="submit" class="ripple-container">Register</button>
      <div class="auth-divider"><span>or</span></div>
      <div id="googleRegisterButton"></div>
    </form>
    <p>Already have account? <a href="/login.html">Login</a></p>
    </section>
  </main>
  <script src="/script.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="/js/api.js"></script>
  <script src="/register.js"></script>
</body>
</html>

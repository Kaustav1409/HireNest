<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Onboarding</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="onboarding-page">
  <header class="auth-topbar">
    <div class="brand">
      <img src="/images/ta-logo.png" alt="HireNest logo" class="brand-logo">
      <h1>HireNest</h1>
    </div>
    <nav>
      <a href="/index.html">Home</a>
      <a id="skipOnboardingLink" href="/dashboard/job-seeker.html">Skip</a>
    </nav>
  </header>
  <main class="auth-main">
    <section class="onboarding-shell animate-on-scroll scale-in">
      <div class="onboarding-head">
        <div class="auth-kicker">Personalized setup</div>
        <h2>Complete Your Onboarding</h2>
        <p id="onboardingSubhead" class="muted"></p>
      </div>
      <div id="onboardingProgress" class="onboarding-progress"></div>

      <form id="onboardingForm" class="onboarding-form">
        <div class="onboarding-step" data-step="1">
          <h3>Step 1: Basic Info</h3>
          <div class="field">
            <input id="preferredRoles" placeholder=" " />
            <label for="preferredRoles">Preferred Roles</label>
          </div>
          <div class="field">
            <select id="experienceLevel">
              <option value="">Select experience level</option>
              <option value="Beginner">Beginner</option>
              <option value="Intermediate">Intermediate</option>
              <option value="Advanced">Advanced</option>
            </select>
            <label for="experienceLevel">Experience Level</label>
          </div>
          <div class="field">
            <textarea id="bio" placeholder=" " rows="4"></textarea>
            <label for="bio">Short Bio (optional)</label>
          </div>
        </div>

        <div class="onboarding-step hidden" data-step="2">
          <h3>Step 2: Skills</h3>
          <div class="field">
            <input id="skills" placeholder=" " />
            <label for="skills">Skills (comma-separated)</label>
          </div>
          <div class="field">
            <input id="resumeFile" type="file" accept="application/pdf">
          </div>
          <p class="muted">Resume upload is optional (PDF only).</p>
        </div>

        <div class="onboarding-step hidden" data-step="3">
          <h3>Step 3: Preferences</h3>
          <div class="field">
            <input id="location" placeholder=" " />
            <label for="location">Location</label>
          </div>
          <label class="check-inline">
            <input id="remotePreferred" type="checkbox">
            <span>Open to remote jobs</span>
          </label>
        </div>

        <div id="recruiterQuickStep" class="onboarding-step hidden" data-step="1">
          <h3>Recruiter Setup</h3>
          <div class="field">
            <input id="companyName" placeholder=" " />
            <label for="companyName">Company Name</label>
          </div>
          <div class="field">
            <textarea id="companyDescription" placeholder=" " rows="4"></textarea>
            <label for="companyDescription">Company Description</label>
          </div>
        </div>

        <p id="onboardingMsg" class="auth-msg hidden"></p>
        <div class="onboarding-actions">
          <button type="button" id="prevStepBtn" class="secondary-btn">Previous</button>
          <button type="button" id="nextStepBtn">Next</button>
          <button type="submit" id="finishStepBtn" class="hidden">Finish</button>
        </div>
      </form>
    </section>
  </main>
  <script src="/script.js"></script>
  <script src="/js/api.js"></script>
  <script src="/onboarding.js"></script>
</body>
</html>
